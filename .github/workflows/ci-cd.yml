name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Deploy Functions to Firebase
        uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy --only functions --ignore-predeploy-hooks
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}